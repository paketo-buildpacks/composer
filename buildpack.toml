api = "0.7"

[buildpack]
  description = "A buildpack for installing Composer, a dependency manager for PHP"
  homepage = "https://github.com/paketo-buildpacks/composer"
  id = "paketo-buildpacks/composer"
  keywords = ["php", "composer"]
  name = "Paketo Buildpack for Composer"
  sbom-formats = ["application/vnd.cyclonedx+json", "application/spdx+json", "application/vnd.syft+json"]

  [[buildpack.licenses]]
    type = "Apache-2.0"
    uri = "https://github.com/paketo-buildpacks/composer/blob/main/LICENSE"

[metadata]
  include-files = ["linux/arm64/bin/build", "linux/arm64/bin/detect", "linux/arm64/bin/run", "linux/amd64/bin/build", "linux/amd64/bin/detect", "linux/amd64/bin/run", "buildpack.toml"]
  pre-package = "./scripts/build.sh --target linux/amd64 --target linux/arm64"
  [metadata.default-versions]
    composer = "*"

  [[metadata.dependencies]]
    checksum = "sha256:9065d89f8b5d8103aa733a6bc24e1b2344d8ccdd63c5b63ccd188f6bca074806"
    cpe = "cpe:2.3:a:getcomposer:composer:2.9.6:*:*:*:*:python:*:*"
    id = "composer"
    licenses = ["MIT"]
    name = "composer"
    purl = "pkg:generic/composer@2.9.6?checksum=9065d89f8b5d8103aa733a6bc24e1b2344d8ccdd63c5b63ccd188f6bca074806&download_url=https://getcomposer.org/download/2.9.6/composer.phar"
    source = "https://getcomposer.org/download/2.9.6/composer.phar"
    source-checksum = "sha256:9065d89f8b5d8103aa733a6bc24e1b2344d8ccdd63c5b63ccd188f6bca074806"
    stacks = ["*"]
    uri = "https://getcomposer.org/download/2.9.6/composer.phar"
    version = "2.9.6"

  [[metadata.dependencies]]
    checksum = "sha256:d3c6801ea6e5dd291d0f149295a4d0f1539a74d5231958fe8fdaa889a497e6cf"
    cpe = "cpe:2.3:a:getcomposer:composer:2.9.7:*:*:*:*:python:*:*"
    id = "composer"
    licenses = ["MIT"]
    name = "composer"
    purl = "pkg:generic/composer@2.9.7?checksum=d3c6801ea6e5dd291d0f149295a4d0f1539a74d5231958fe8fdaa889a497e6cf&download_url=https://getcomposer.org/download/2.9.7/composer.phar"
    source = "https://getcomposer.org/download/2.9.7/composer.phar"
    source-checksum = "sha256:d3c6801ea6e5dd291d0f149295a4d0f1539a74d5231958fe8fdaa889a497e6cf"
    stacks = ["*"]
    uri = "https://getcomposer.org/download/2.9.7/composer.phar"
    version = "2.9.7"

  [[metadata.dependency-constraints]]
    constraint = "2.*"
    id = "composer"
    patches = 2

[[stacks]]
  id = "io.buildpacks.stacks.jammy"

[[stacks]]
  id = "io.buildpacks.stacks.noble"

[[targets]]
  arch = "amd64"
  os = "linux"

[[targets]]
  arch = "arm64"
  os = "linux"
