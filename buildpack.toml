api = "0.7"

[buildpack]
  description = "A buildpack for installing Composer, a dependency manager for PHP"
  homepage = "https://github.com/paketo-buildpacks/composer"
  id = "paketo-buildpacks/composer"
  keywords = ["php", "composer"]
  name = "Paketo Buildpack for Composer"
  sbom-formats = ["application/vnd.cyclonedx+json", "application/spdx+json", "application/vnd.syft+json"]

  [[buildpack.licenses]]
    type = "Apache-2.0"
    uri = "https://github.com/paketo-buildpacks/composer/blob/main/LICENSE"

[metadata]
  include-files = ["linux/arm64/bin/build", "linux/arm64/bin/detect", "linux/arm64/bin/run", "linux/amd64/bin/build", "linux/amd64/bin/detect", "linux/amd64/bin/run", "buildpack.toml"]
  pre-package = "./scripts/build.sh --target linux/amd64 --target linux/arm64"
  [metadata.default-versions]
    composer = "*"

  [[metadata.dependencies]]
    checksum = "sha256:345b9c6a98da5c30dcbd4b0d99fc8710bf0ae98a3898eea18f7b2ad9dec93f06"
    cpe = "cpe:2.3:a:getcomposer:composer:2.10.1:*:*:*:*:python:*:*"
    id = "composer"
    licenses = ["MIT"]
    name = "composer"
    purl = "pkg:generic/composer@2.10.1?checksum=345b9c6a98da5c30dcbd4b0d99fc8710bf0ae98a3898eea18f7b2ad9dec93f06&download_url=https://getcomposer.org/download/2.10.1/composer.phar"
    source = "https://getcomposer.org/download/2.10.1/composer.phar"
    source-checksum = "sha256:345b9c6a98da5c30dcbd4b0d99fc8710bf0ae98a3898eea18f7b2ad9dec93f06"
    stacks = ["*"]
    uri = "https://getcomposer.org/download/2.10.1/composer.phar"
    version = "2.10.1"

  [[metadata.dependencies]]
    checksum = "sha256:5ee7125f8a30a34d246cefdc0bc85b8a783b28f2aec968994118512350d28027"
    cpe = "cpe:2.3:a:getcomposer:composer:2.10.2:*:*:*:*:python:*:*"
    id = "composer"
    licenses = ["MIT"]
    name = "composer"
    purl = "pkg:generic/composer@2.10.2?checksum=5ee7125f8a30a34d246cefdc0bc85b8a783b28f2aec968994118512350d28027&download_url=https://getcomposer.org/download/2.10.2/composer.phar"
    source = "https://getcomposer.org/download/2.10.2/composer.phar"
    source-checksum = "sha256:5ee7125f8a30a34d246cefdc0bc85b8a783b28f2aec968994118512350d28027"
    stacks = ["*"]
    uri = "https://getcomposer.org/download/2.10.2/composer.phar"
    version = "2.10.2"

  [[metadata.dependency-constraints]]
    constraint = "2.*"
    id = "composer"
    patches = 2

[[stacks]]
  id = "io.buildpacks.stacks.jammy"

[[stacks]]
  id = "io.buildpacks.stacks.noble"

[[targets]]
  arch = "amd64"
  os = "linux"

[[targets]]
  arch = "arm64"
  os = "linux"
